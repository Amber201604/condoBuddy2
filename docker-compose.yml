  frappe-bridge:
    build: ./frappe-bridge
    container_name: condobuddy2-frappe-bridge
    ports:
      - "8002:8002"
    environment:
      - FRAPPE_BASE_URL=http://frappe:8080
      - FRAPPE_API_KEY=${FRAPPE_API_KEY:-}
      - FRAPPE_API_SECRET=${FRAPPE_API_SECRET:-}
      - CORE_BASE_URL=http://core:8000
    networks:
      - condobuddy2
    restart: unless-stopped

  # MQTT Broker (for IoT sensors)
  mqtt:
    image: eclipse-mosquitto:2
    container_name: condobuddy2-mqtt
    ports:
      - "1883:1883"
      # Container's websocket listener (9001) is mapped to host 9883 to avoid
      # colliding with the MinIO console, which already uses host port 9001.
      - "9883:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - condobuddy2
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  mariadb_data:
  frappe_sites:

networks:
  condobuddy2:
    driver: bridge
