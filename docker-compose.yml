services:
  # Core Async Backend
  core:
    build: ./core
    container_name: condobuddy2-core
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-condobuddy}:${POSTGRES_PASSWORD:-condobuddy}@postgres:5432/${POSTGRES_DB:-condobuddy2}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_BUCKET=condobuddy2
      - FRAPPE_BASE_URL=http://frappe:8080
      - NVR_BASE_URL=http://nvr-connector:8001
      - MQTT_BROKER_HOST=mqtt
      - MQTT_BROKER_PORT=1883
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - condobuddy2
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: condobuddy2-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-condobuddy}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-condobuddy}
      - POSTGRES_DB=${POSTGRES_DB:-condobuddy2}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U condobuddy -d condobuddy2"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - condobuddy2
    restart: unless-stopped

  # Redis (Cache + Celery + WebSocket pub/sub)
  redis:
    image: redis:7-alpine
    container_name: condobuddy2-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - condobuddy2
    restart: unless-stopped

  # MinIO (Object Storage for snapshots/recordings)
  minio:
    image: minio/minio:latest
    container_name: condobuddy2-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - condobuddy2
    restart: unless-stopped

  # Celery Worker
  celery:
    build: ./core
    container_name: condobuddy2-celery
    command: celery -A app.tasks worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-condobuddy}:${POSTGRES_PASSWORD:-condobuddy}@postgres:5432/${POSTGRES_DB:-condobuddy2}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - condobuddy2
    restart: unless-stopped

  # NVR Connector (RTSP Stream Proxy)
  # nvr-connector:
  #   build: ./nvr-connector
  #   container_name: condobuddy2-nvr
  #   ports:
  #     - "8001:8001"
  #   environment:
  #     - INTERNAL_API_KEY=${INTERNAL_API_KEY:-}
  #   networks:
  #     - condobuddy2
  #   restart: unless-stopped

  # MariaDB for Frappe
  mariadb:
    image: mariadb:10.6
    container_name: condobuddy2-mariadb
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      - MYSQL_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD:-condobuddy_mariadb_root}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./frappe/docker/mariadb.cnf:/etc/mysql/conf.d/mariadb.cnf
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - condobuddy2
    restart: unless-stopped

  # Frappe/ERPNext (Management Portal + Resident Web UI)
  frappe:
    build: ./frappe
    container_name: condobuddy2-frappe
    ports:
      - "8080:8080"
    environment:
